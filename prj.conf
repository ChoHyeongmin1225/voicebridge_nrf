# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="VoiceBridge"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_NUS=y

# I2S (MAX98357A)
CONFIG_I2S=y

# GPIO (LED)
CONFIG_GPIO=y

# 로그
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# 스레드 스택 크기
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# BLE ACL 버퍼 (MTU 확장 대비)
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
# RX 버퍼 수 증가 → Write Without Response 폭발 전송 시 드롭 완화
CONFIG_BT_BUF_ACL_RX_COUNT=10

# EATT 비활성화 → Android의 L2CAP channel 0x003a 협상 시도를 명시적 거절
# (미설정 시 Zephyr가 무시만 하고 Android BLE 스택이 불안정해짐)
CONFIG_BT_EATT=n
